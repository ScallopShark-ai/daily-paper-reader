          note: ''
        - query: Recent advances in VLA foundation models for embodied AI
          query_cn: 具身智能中VLA基础模型的最新进展
          enabled: true
          source: manual
          note: ''
        - query: Survey of vision language action models in robot learning
          query_cn: 机器人学习中的视觉 语言 动作模型综述
