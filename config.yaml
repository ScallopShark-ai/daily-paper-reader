subscriptions:
  schema_migration:
    stage: A
    diff_threshold_pct: 15
  keyword_recall_mode: or
  intent_profiles:
    - tag: RL论文
      description: 查找有关强化学习的相关论文
      enabled: true
      paper_sources:
        - arxiv
      keywords:
        - keyword: Reinforcement Learning
          keyword_cn: 强化学习
          query: Reinforcement Learning fundamental theories and algorithms
        - keyword: Actor-Critic
          keyword_cn: 演员-评论家框架
          query: Actor-Critic framework and hybrid RL models
        - keyword: Multi-Agent RL
          keyword_cn: 多智能体强化学习
          query: Multi-Agent Reinforcement Learning coordination and competition
        - keyword: Proximal Policy Optimization
          keyword_cn: 近端策略优化
          query: PPO algorithm and robust policy optimization
        - keyword: Model-Based RL
          keyword_cn: 基于模型的强化学习
          query: Model-Based Reinforcement Learning and world models
        - keyword: Offline RL
          keyword_cn: 离线强化学习
          query: Offline Reinforcement Learning and batch RL techniques
      intent_queries:
        - query: State of the art reinforcement learning algorithms and survey papers
          query_cn: 强化学习前沿算法及综述论文
          enabled: true
          source: manual
          note: ''
        - query: Recent breakthroughs in deep reinforcement learning research
          query_cn: 深度强化学习研究的最新突破
          enabled: true
          source: manual
          note: ''
        - query: Applications of reinforcement learning in robotics and control
          query_cn: 强化学习在机器人与控制领域的应用
          enabled: true
          source: manual
          note: ''
        - query: Theoretical foundations and convergence analysis of reinforcement learning
          query_cn: 强化学习的理论基础与收敛性分析
          enabled: true
          source: manual
          note: ''
      updated_at: '2026-04-06T09:24:01.741Z'
    - tag: VLA
      description: 帮我找到有关VLA领域的相关论文
      enabled: true
      paper_sources:
        - arxiv
      keywords:
        - keyword: VLA
          keyword_cn: 视觉-语言-动作模型
          query: Vision-Language-Action models in robotics
        - keyword: Vision-Language-Action
          keyword_cn: 视觉语言动作
          query: Vision-Language-Action foundation models for embodied AI
        - keyword: Embodied AI
          keyword_cn: 具身智能
